<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NapsterNPT's Website | Homeworks (login)</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Mono:wght@400;500&display=swap"
        rel="stylesheet" />
</head>

<body>
    <div class="card" id="card">
        <p class="label-top">Area protetta</p>
        <h1>Homework<br>Login</h1>

        <div class="field">
            <label for="username">Username</label>
            <input type="text" id="username" autocomplete="username" placeholder="il tuo nome" />
        </div>
        <div class="field">
            <label for="password">Password</label>
            <input type="password" id="password" autocomplete="current-password" placeholder="••••••••" />
        </div>

        <button onclick="doLogin()">Entra →</button>
        <p class="error-msg" id="err">Username o password errati.</p>

        <p class="footer-note">Accesso riservato agli utenti autorizzati.</p>
    </div>

    <script>
        const USERS = {
            "NapsterNPT": "Fxbdmw39U",
            "Algio": "izF3EOwv9",
            "Avo": "lcZ3KBYsA",
            "Diego": "V08hqLZg7"
        };

        document.getElementById('password').addEventListener('keydown', e => {
            if (e.key === 'Enter') doLogin();
        });
        document.getElementById('username').addEventListener('keydown', e => {
            if (e.key === 'Enter') document.getElementById('password').focus();
        });

        function doLogin() {
            const user = document.getElementById('username').value.trim().toLowerCase();
            const pass = document.getElementById('password').value;
            const err = document.getElementById('err');
            const card = document.getElementById('card');

            if (USERS[user] && USERS[user] === pass) {
                sessionStorage.setItem('hw_auth', 'true');
                sessionStorage.setItem('hw_user', user);
                window.location.href = 'index.html';
            } else {
                err.classList.add('show');
                card.classList.remove('shake');
                void card.offsetWidth;
                card.classList.add('shake');
                document.getElementById('password').value = '';
                document.getElementById('password').focus();
            }
        }
    </script>
</body>

</html>
