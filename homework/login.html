<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-site-verification" content="gB28t2pf-SDUrMkWtlW9TnWFft1RW0w7X2vPIpRmmdc">

    <title>NapsterNPT's Website | Homeworks | Login</title>

    <meta name="description" content="Hi, thanks for reading this, wanna know more?">

    <link rel="icon" type="image/png" href="assets/logo.png" />

    <link rel="stylesheet" href="../style.css">
</head>

<body>
    <div class="card" id="card">
        <h1>■ Homework Login ■</h1>

        <div class="field">
            <label for="username">Username</label>
            <input type="text" id="username" autocomplete="username" placeholder="il tuo nome" />
        </div>
        <div class="field">
            <label for="password">Password</label>
            <input type="password" id="password" autocomplete="current-password" placeholder="••••••••" />
        </div>

        <button onclick="doLogin()">Login →</button>
    </div>

    <footer>
        <p>© 2025-2026 NapsterNPT. All rights reserved.</p>
    </footer>

    <script>
        const USERS = {
            "napster": "Fxbdmw39U",
            "algio": "izF3EOwv9",
            "avo": "lcZ3KBYsA",
            "diego": "V08hqLZg7"
        };

        function doLogin() {
            var user = document.getElementById('username').value.trim().toLowerCase();
            var pass = document.getElementById('password').value;

            if (USERS.hasOwnProperty(user) && USERS[user] === pass) {
                sessionStorage.setItem('hw_auth', 'true');
                sessionStorage.setItem('hw_user', user);
                window.location.href = 'index.html';
            } else {
                alert('Username o password errati.');
                document.getElementById('password').value = '';
                document.getElementById('password').focus();
            }
        }

        document.getElementById('password').addEventListener('keydown', function (e) {
            if (e.key === 'Enter') doLogin();
        });
        document.getElementById('username').addEventListener('keydown', function (e) {
            if (e.key === 'Enter') document.getElementById('password').focus();
        });
    </script>
</body>

</html>
